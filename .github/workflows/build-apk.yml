name: Build + Deploy + Release APK

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Python deps
        run: pip install pillow requests

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Build Web
        run: npm run build

      - name: Deploy dist to Pages (main branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          force_orphan: true

      - name: Strip images for APK build (images served via Pages CDN)
        run: |
          du -sh dist/images/
          rm -rf dist/images/
          echo "dist/images/ stripped for APK build"

      - name: Sync Capacitor Android (without images)
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p _release
          cp android/app/build/outputs/apk/debug/app-debug.apk _release/an-wallpaper-auto.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-latest
          name: "🔧 自动构建 APK"
          body: "每次 push 到 source 自动构建"
          files: _release/an-wallpaper-auto.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
